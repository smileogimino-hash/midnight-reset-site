<!doctype html>
<html lang="ja">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>疲れを理解するサイト</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section class="hero">
      <div class="character">
        <img src="sleeping_up.png" alt="" class="sleeping-up" />
        <img src="sleeping_down.png" alt="" class="sleeping-down" />
      </div>

      <div class="decoration">
        <img src="cloud1.png" alt="" class="cloud cloud1" />
        <img src="cloud2.png" alt="" class="cloud cloud2" />
        <img src="cloud3.png" alt="" class="cloud cloud3" />
      </div>

      <div class="message-area">
        <p>
          休みたいのに、休めてない。<br />
          これってどういうことなんだろう。
        </p>
      </div>
    </section>
    <section class="question"></section>

    <section class="answer"></section>

    <section class="message"></section>

    <footer></footer>

  <script src="main.js"></script>
</html>
