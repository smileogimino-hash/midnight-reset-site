<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>休みたいのに休めてない、これってどういうことなんだろう</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <main class="page">
      <section class="hero">
        <!-- 雲 -->
        <div class="hero__cloud cloud01">
          <img src="cloud.svg" alt="" />
        </div>

        <div class="hero__cloud cloud02">
          <img src="cloud.svg" alt="" />
        </div>

        <div class="hero__cloud cloud03">
          <img src="cloud.svg" alt="" />
        </div>

        <!-- 人物 -->
        <img
          src="sleeping_down.svg"
          alt=""
          class="hero__character hero__character--top"
        />

        <img
          src="sleeping_up.svg"
          alt=""
          class="hero__character hero__character--bottom"
        />

        <!-- メッセージ -->
        <div class="hero__message">
          <p>
            休みたいのに、休めてない。<br />
            これってどういうことなんだろう。
          </p>
        </div>
      </section>

      <section class="question">
        <div class="decoration">
          <img src="img/cloud.png" alt="" class="cloud cloud-left" />
          <img src="img/cloud.png" alt="" class="cloud cloud-right" />
        </div>

        <div class="question-inner">
          <p class="question-text">今のあなたの状態に近いものはどれですか</p>

          <div class="choice-area">
            <div class="option">
              <button class="button-option">
                01. ついスマホの画面を見続けてしまう
              </button>
            </div>

            <div class="option">
              <button class="button-option">02. 動くのが面倒</button>
            </div>

            <div class="option">
              <button class="button-option">03. 体力も気力も限界</button>
            </div>
          </div>
        </div>
      </section>

      <section class="answer">
        <img src="stargroup.svg" alt="" class="answer__bg" />

        <div class="answer__contents">
          <!-- 01 -->
          <section class="answer-block answer01">
            <img
              src="decoration01.svg"
              alt=""
              class="answer-block__decoration"
            />

            <img src="sitting.svg" alt="" class="answer-block__character" />

            <div class="suggestion">
              <p class="suggestion__label">そんなヒトに</p>
              <ul class="suggestion-list">
                <li>
                  <button class="suggestion-btn">
                    <span class="suggestion-btn__square"></span>
                    水を一口
                  </button>
                </li>
                <li>
                  <button class="suggestion-btn">
                    <span class="suggestion-btn__square"></span>
                    天井を見る
                  </button>
                </li>

                <li>
                  <button class="suggestion-btn">
                    <span class="suggestion-btn__square"></span>
                    深呼吸する
                  </button>
                </li>

                <li>
                  <button class="suggestion-btn">
                    <span class="suggestion-btn__square"></span>
                    外を見る
                  </button>
                </li>

                <li>
                  <button class="suggestion-btn">
                    <span class="suggestion-btn__square"></span>
                    立ち上がる
                  </button>
                </li>
              </ul>

              <p class="suggestion__tap">Tap!</p>

              <div class="slider">
                <div class="slider__track"></div>

                <div class="slider__thumb"></div>
              </div>
            </div>
          </section>
          <!-- 02 -->
          <section class="answer-block answer02">
            <img
              src="decoration02.svg"
              alt=""
              class="answer-block__decoration"
            />

            <img src="sitting.svg" alt="" class="answer-block__character" />

            <div class="suggestion">
              <p class="suggestion__label">そんなヒトに</p>

              <div class="suggestion-buttons">
                <button class="suggestion-btn">
                  <span class="suggestion-btn__square"></span>
                  水を一口
                </button>

                <button class="suggestion-btn">
                  <span class="suggestion-btn__square"></span>
                  天井を見る
                </button>

                <button class="suggestion-btn">
                  <span class="suggestion-btn__square"></span>
                  深呼吸する
                </button>

                <button class="suggestion-btn">
                  <span class="suggestion-btn__square"></span>
                  外を見る
                </button>

                <button class="suggestion-btn">
                  <span class="suggestion-btn__square"></span>
                  立ち上がる
                </button>
              </div>

              <p class="suggestion__tap">Tap!</p>

              <div class="slider">
                <div class="slider__track"></div>

                <div class="slider__thumb"></div>
              </div>
            </div>
          </section>
          <!-- 03 -->
          <section class="answer-block answer03">
            <img
              src="decoration03.svg"
              alt=""
              class="answer-block__decoration"
            />

            <img src="sitting.svg" alt="" class="answer-block__character" />

            <div class="suggestion">
              <p class="suggestion__label">そんなヒトに</p>

              <div class="suggestion-buttons">
                <button class="suggestion-btn">
                  <span class="suggestion-btn__square"></span>
                  水を一口
                </button>

                <button class="suggestion-btn">
                  <span class="suggestion-btn__square"></span>
                  天井を見る
                </button>

                <button class="suggestion-btn">
                  <span class="suggestion-btn__square"></span>
                  深呼吸する
                </button>

                <button class="suggestion-btn">
                  <span class="suggestion-btn__square"></span>
                  外を見る
                </button>

                <button class="suggestion-btn">
                  <span class="suggestion-btn__square"></span>
                  立ち上がる
                </button>
              </div>

              <p class="suggestion__tap">Tap!</p>

              <div class="slider">
                <div class="slider__track"></div>

                <div class="slider__thumb"></div>
              </div>
            </div>
          </section>
        </div>
      </section>

      <section class="message">
        <div class="message__inner">
          <p>
            誰もが経験するのに、<br />
            実はまだわかっていないことも多い「疲れ」。<br />
            <br />
            ただ、言えるのは、<br />
            疲れはヒトを守るためのものだということ。<br />
            <br />
            「何もできなかった」<br />
            そう思ったときこそ、<br />
            疲れの理由を知ることに意味があるのかもしれません。
          </p>
        </div>
      </section>

      <footer class="footer">
        <p>©2026 pokke</p>
      </footer>
    </main>
  </body>
  <script src="main.js"></script>
</html>
